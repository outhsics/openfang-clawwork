name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile exporter
        run: python3 -m py_compile scripts/export_clawwork_openfang_assets.py scripts/backfill_openfang_result.py
      - name: Run smoke test
        run: python3 tests/smoke_test.py
      - name: Run backfill smoke test
        run: python3 tests/backfill_smoke_test.py
